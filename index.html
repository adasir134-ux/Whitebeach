<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="color-scheme" content="only light">
<meta name="supported-color-schemes" content="light">
<meta name="theme-color" content="#f5f5f7">
<title>Pickalbatros Whitebeach</title>
<style>
  :root{
    color-scheme: only light;
    --bg:#f5f5f7;
    --card-bg:#ffffff;
    --border:#eaeaec;
    --border-hover:#dcdce0;
    --text-main:#1a1a1a;
    --text-sub:#767680;
    --shadow:rgba(20,20,25,0.06);
    --shadow-hover:rgba(20,20,25,0.14);
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html{
    -webkit-text-size-adjust:100%;
    color-scheme: only light;
  }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    overflow-x:hidden;
    background:var(--bg) !important;
  }

  body{
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background:var(--bg) !important;
    color:var(--text-main) !important;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 18px;
    -webkit-font-smoothing:antialiased;
  }

  /* Belt-and-suspenders: if a browser still evaluates prefers-color-scheme
     even after the meta tag / color-scheme property, re-force our light
     palette so nothing gets auto-inverted. */
  @media (prefers-color-scheme: dark){
    html, body{
      background:var(--bg) !important;
      color:var(--text-main) !important;
    }
    .link-card{
      background:var(--card-bg) !important;
      border-color:var(--border) !important;
    }
    .heading{ color:var(--text-main) !important; }
    .subheading, .footer-note{ color:var(--text-sub) !important; }
  }

  /* ---- Mobile-first base (phones) ---- */
  .page{
    width:100%;
    max-width:440px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .heading{
    font-size:clamp(21px, 6vw, 26px);
    font-weight:700;
    letter-spacing:-0.01em;
    line-height:1.25;
    margin:0 0 8px;
    color:var(--text-main);
  }

  .subheading{
    font-size:clamp(13px, 3.6vw, 14.5px);
    font-weight:400;
    color:var(--text-sub);
    margin:0 0 32px;
    line-height:1.6;
    max-width:280px;
  }

  .link-list{
    list-style:none;
    margin:0;
    padding:0;
    width:100%;
    display:flex;
    flex-direction:column;
    gap:18px; /* generous vertical spacing = fewer mis-taps */
  }

  .link-card{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    min-height:104px; /* comfortable thumb target, well above 44px min */
    padding:14px;
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:18px;
    box-shadow:0 2px 8px var(--shadow);
    transition:transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    touch-action:manipulation;
  }

  .link-card img{
    max-width:70%;
    max-height:48px;
    width:auto;
    height:auto;
    object-fit:contain;
  }

  /* Hover only applies on devices that actually support hover (real cursors),
     so it never sticks/lags on touch screens */
  @media (hover:hover) and (pointer:fine){
    .link-card:hover{
      transform:scale(1.02);
      box-shadow:0 14px 28px var(--shadow-hover);
      border-color:var(--border-hover);
    }
  }

  .link-card:active{
    transform:scale(0.98);
    box-shadow:0 2px 6px var(--shadow);
    border-color:var(--border-hover);
  }

  .link-card:focus-visible{
    outline:2px solid var(--border-hover);
    outline-offset:2px;
  }

  .footer-note{
    margin-top:32px;
    font-size:12px;
    font-weight:400;
    color:var(--text-sub);
    letter-spacing:0.01em;
  }

  /* ---- Small phones (e.g. iPhone SE, ~360px and below) ---- */
  @media (max-width: 360px){
    body{ padding:32px 14px; }
    .link-card{ min-height:92px; padding:12px; }
    .link-card img{ max-height:40px; }
    .link-list{ gap:14px; }
  }

  /* ---- Tablet and up ---- */
  @media (min-width: 600px){
    .page{ max-width:460px; }
    .link-card{ min-height:112px; }
  }

  @media (prefers-reduced-motion: reduce){
    .link-card{
      transition:none !important;
    }
  }
</style>
</head>
<body>

  <main class="page">
    <h1 class="heading">Pickalbatros Whitebeach</h1>

    <ul class="link-list">

          <img src="tripad.png" alt="tripadvisor">

          <img src="google1.png" alt="Google">
        </a>
      </li>
      <!-- TopHotels -->
      <li>
        <a class="link-card" href="https://tophotels.ru/en/hotel/al305003/review/add" target="_blank" rel="noopener noreferrer">
          <img src="topHotels.png" alt="TopHotels">
        </a>
      </li>
    </ul>

    <p class="footer-note">Thank you for staying with us</p>
  </main>

</body>
</html>
